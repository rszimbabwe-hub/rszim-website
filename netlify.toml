[build]
  command = "npm run build"
  publish = "dist"

# Avoid blank screens after redeploys: long-lived cache only for hashed Vite assets;
# HTML and SPA shell must not be cached by intermediaries (some mobile carriers cache aggressively).
# Stricter rules for / and /index.html override the broad /* rule below.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "private, no-cache, no-store, max-age=0, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "private, no-cache, no-store, max-age=0, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA: send all routes to index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
